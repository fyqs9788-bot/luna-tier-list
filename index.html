<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Maidens Fantasy Tier List</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:sans-serif;padding:14px;background:#fff;color:#111;}
h2{font-size:15px;font-weight:500;margin-bottom:12px;}
.tag{font-size:11px;background:#e0f0ff;color:#1a5fa8;padding:2px 8px;border-radius:10px;margin-left:6px;}
.slbl{font-size:11px;color:#888;margin-bottom:5px;}
.frow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;}
.fwrap{margin-bottom:12px;}
button.fbtn{font-size:11px;padding:3px 10px;border-radius:6px;border:1px solid #ccc;background:#f5f5f5;color:#555;cursor:pointer;}
button.fbtn.on{background:#fff;color:#111;border-color:#666;font-weight:500;}
button.rbtn{font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid #ccc;background:#f5f5f5;color:#555;cursor:pointer;display:inline-flex;align-items:center;gap:4px;}
button.rbtn.on{background:#fff;color:#111;border-color:#666;font-weight:500;}
button.rbtn img{width:16px;height:16px;border-radius:50%;object-fit:cover;}
.tier-row{display:flex;align-items:stretch;margin-bottom:5px;border-radius:8px;overflow:hidden;border:1px solid #ddd;min-height:86px;}
.tier-lbl{width:52px;min-width:52px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:600;color:#fff;flex-shrink:0;}
.tier-slots{flex:1;display:flex;flex-wrap:wrap;gap:5px;padding:6px 8px;background:#f9f9f9;align-items:center;min-height:86px;border-left:1px solid #ddd;}
.tier-slots.over{background:#dbeeff;}
.card{width:64px;height:82px;border-radius:8px;border:1px solid #ddd;cursor:grab;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:6px;gap:2px;background:#fff;transition:transform .1s;position:relative;user-select:none;}
.card:hover{transform:scale(1.07);border-color:#aaa;z-index:2;}
.card.dragging{opacity:.4;}
/* avatar wrapper — icons overlap it */
.avwrap{position:relative;width:40px;height:40px;flex-shrink:0;}
.avwrap img.av{width:40px;height:40px;border-radius:50%;object-fit:cover;display:block;}
.avwrap .init{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;background:#eee;color:#555;border:1px solid #ccc;}
/* Раса — top-left */
.ico-rasa{position:absolute;top:-3px;left:-3px;width:17px;height:17px;border-radius:50%;border:2px solid #fff;overflow:hidden;background:#fff;}
.ico-rasa img{width:100%;height:100%;object-fit:cover;display:block;}
/* Класс — bottom-right */
.ico-role{position:absolute;bottom:-3px;right:-3px;width:17px;height:17px;border-radius:50%;border:2px solid #fff;overflow:hidden;background:#fff;}
.ico-role img{width:100%;height:100%;object-fit:cover;display:block;}
.cname{font-size:9px;color:#333;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;margin-top:1px;}
.delbtn{position:absolute;top:2px;right:2px;width:14px;height:14px;border-radius:50%;background:#fee2e2;color:#c00;border:none;cursor:pointer;font-size:10px;display:none;align-items:center;justify-content:center;line-height:1;font-weight:bold;}
.card:hover .delbtn{display:flex;}
.pool-box{margin-top:10px;border:1px solid #ddd;border-radius:8px;padding:8px;}
.plbl{font-size:12px;color:#666;margin-bottom:6px;}
.pslots{display:flex;flex-wrap:wrap;gap:5px;min-height:72px;}
.pslots.over{background:#dbeeff;border-radius:8px;}
.addbox{margin-top:12px;display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
.addbox input[type=text]{font-size:13px;padding:5px 10px;border-radius:6px;border:1px solid #ccc;width:110px;}
.addbox select{font-size:12px;padding:5px 7px;border-radius:6px;border:1px solid #ccc;background:#fff;}
.addbox button,.expbtn,.uplbl{font-size:12px;padding:5px 11px;border-radius:6px;border:1px solid #ccc;background:#fff;cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
.addbox button:hover,.expbtn:hover,.uplbl:hover{background:#f5f5f5;}
.uplbl input{display:none;}
.hint{font-size:11px;color:#aaa;margin-top:6px;}
.expbtn{margin-top:8px;}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;align-items:center;}
.leggrp{display:flex;flex-direction:column;gap:4px;}
.legtitle{font-size:10px;color:#aaa;margin-bottom:1px;}
.legrow{display:flex;gap:8px;flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:#555;}
.leg img{width:18px;height:18px;border-radius:50%;object-fit:cover;}
</style>
</head>
<body>
<h2>Maidens Fantasy Tier List <span class="tag">раса (↖) + класс (↘) + иконки</span></h2>
<div class="fwrap">
  <div class="slbl">Класс</div>
  <div class="frow" id="role-filters"></div>
  <div class="slbl" style="margin-top:6px">Раса</div>
  <div class="frow" id="rasa-filters"></div>
</div>
<div id="tiers"></div>
<div class="pool-box">
  <div class="plbl">Нераспределённые — перетащите в нужный уровень</div>
  <div class="pslots" id="pool" ondragover="ov(event,'pool')" ondrop="dp(event,'pool')" ondragleave="ol(event)"></div>
</div>
<div class="addbox">
  <input type="text" id="iname" placeholder="Имя персонажа">
  <select id="irole">
    <option>Воин</option><option>Маг</option><option>Поддержка</option><option>Страж</option>
  </select>
  <select id="irasa">
    <option>Свет</option><option>Тьма</option><option>Вода</option>
    <option>Огонь</option><option>Ветер</option><option>Звездный свет</option>
  </select>
  <label class="uplbl">↑ Аватар<input type="file" accept="image/*" id="ifile"></label>
  <button onclick="addChar()">+ Добавить</button>
</div>
<div class="hint">Загрузите аватар → введите имя → класс → расу → Добавить</div>
<button class="expbtn" onclick="doExport()">↓ Экспорт рейтинга</button>
<div class="legend" id="legend"></div>

};

const TIERS = [
  {id:"SS", color:"#b91c1c"},
  {id:"S+", color:"#c2410c"},
  {id:"S",  color:"#b45309"},
  {id:"A",  color:"#15803d"},
  {id:"B",  color:"#1d4ed8"}
];
const ROLES = ["Воин","Маг","Поддержка","Страж"];
const RASAS = ["Свет","Тьма","Вода","Огонь","Ветер","Звездный свет"];

let chars = [
  {id:"c1", name:"Мелодия", role:"Поддержка", rasa:"Свет",          img:null, tier:"pool"},
  {id:"c2", name:"Юла",     role:"Поддержка", rasa:"Свет",          img:null, tier:"pool"},
  {id:"c3", name:"Дракон",  role:"Воин",      rasa:"Огонь",         img:null, tier:"pool"},
  {id:"c4", name:"Фрейя",   role:"Страж",     rasa:"Вода",          img:null, tier:"pool"},
  {id:"c5", name:"Элена",   role:"Маг",       rasa:"Тьма",          img:null, tier:"pool"},
  {id:"c6", name:"Мика",    role:"Воин",      rasa:"Ветер",         img:null, tier:"pool"},
  {id:"c7", name:"Лиан",    role:"Маг",       rasa:"Звездный свет", img:null, tier:"pool"},
  {id:"c8", name:"София",   role:"Страж",     rasa:"Тьма",          img:null, tier:"pool"}
];

let drag = null, fRole = "all", fRasa = "all", uid = 200, pendingImg = null;

document.getElementById("ifile").addEventListener("change", function() {
  const f = this.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = e => { pendingImg = e.target.result; };
  r.readAsDataURL(f);
});

function iconBtn(dict, key, cls) {
  const btn = document.createElement("button");
  btn.className = cls;
  const ic = dict[key];
  if (ic) {
    const img = document.createElement("img");
    img.src = ic; img.alt = key;
    btn.appendChild(img);
  }
  btn.appendChild(document.createTextNode(" " + key));
  return btn;
}

function buildFilters() {
  const rf = document.getElementById("role-filters");
  const allR = document.createElement("button");
  allR.className = "fbtn on"; allR.textContent = "Все";
  allR.onclick = () => setF("role","all",allR);
  rf.appendChild(allR);
  ROLES.forEach(r => {
    const btn = iconBtn(ROLE_ICON, r, "rbtn");
    btn.onclick = () => setF("role", r, btn);
    rf.appendChild(btn);
  });

  const rasaf = document.getElementById("rasa-filters");
  const allRa = document.createElement("button");
  allRa.className = "fbtn on"; allRa.textContent = "Все";
  allRa.onclick = () => setF("rasa","all",allRa);
  rasaf.appendChild(allRa);
  RASAS.forEach(r => {
    const btn = iconBtn(RASA_ICON, r, "rbtn");
    btn.onclick = () => setF("rasa", r, btn);
    rasaf.appendChild(btn);
  });
}

function buildLegend() {
  const leg = document.getElementById("legend");

  const g1 = document.createElement("div"); g1.className = "leggrp";
  const t1 = document.createElement("div"); t1.className = "legtitle"; t1.textContent = "Класс";
  const r1 = document.createElement("div"); r1.className = "legrow";
  ROLES.forEach(r => {
    const d = document.createElement("div"); d.className = "leg";
    const ic = ROLE_ICON[r];
    if (ic) { const img = document.createElement("img"); img.src = ic; img.alt = r; d.appendChild(img); }
    d.appendChild(document.createTextNode(r));
    r1.appendChild(d);
  });
  g1.appendChild(t1); g1.appendChild(r1); leg.appendChild(g1);

  const g2 = document.createElement("div"); g2.className = "leggrp";
  const t2 = document.createElement("div"); t2.className = "legtitle"; t2.textContent = "Раса";
  const r2 = document.createElement("div"); r2.className = "legrow";
  RASAS.forEach(r => {
    const d = document.createElement("div"); d.className = "leg";
    const ic = RASA_ICON[r];
    if (ic) { const img = document.createElement("img"); img.src = ic; img.alt = r; d.appendChild(img); }
    d.appendChild(document.createTextNode(r));
    r2.appendChild(d);
  });
  g2.appendChild(t2); g2.appendChild(r2); leg.appendChild(g2);
}

function makeCard(c) {
  const d = document.createElement("div");
  d.className = "card"; d.draggable = true; d.dataset.id = c.id;

  // avatar wrapper
  const wrap = document.createElement("div"); wrap.className = "avwrap";

  if (c.img) {
    const img = document.createElement("img"); img.className = "av"; img.src = c.img; img.alt = c.name;
    wrap.appendChild(img);
  } else {
    const ini = document.createElement("div"); ini.className = "init";
    ini.textContent = c.name.slice(0,2);
    wrap.appendChild(ini);
  }

  // Раса icon — top-left
  const icoRasa = document.createElement("div"); icoRasa.className = "ico-rasa";
  const ricoSrc = RASA_ICON[c.rasa];
  if (ricoSrc) {
    const ri = document.createElement("img"); ri.src = ricoSrc; ri.alt = c.rasa;
    icoRasa.appendChild(ri);
  }
  wrap.appendChild(icoRasa);

  // Класс icon — bottom-right
  const icoRole = document.createElement("div"); icoRole.className = "ico-role";
  const roleIcoSrc = ROLE_ICON[c.role];
  if (roleIcoSrc) {
    const ri2 = document.createElement("img"); ri2.src = roleIcoSrc; ri2.alt = c.role;
    icoRole.appendChild(ri2);
  }
  wrap.appendChild(icoRole);

  d.appendChild(wrap);

  // name
  const nm = document.createElement("div"); nm.className = "cname"; nm.textContent = c.name;
  d.appendChild(nm);

  // delete btn
  const del = document.createElement("button"); del.className = "delbtn"; del.textContent = "x";
  del.onclick = e => { e.stopPropagation(); chars = chars.filter(x => x.id !== c.id); render(); };
  d.appendChild(del);

  d.addEventListener("dragstart", e => {
    drag = c.id;
    setTimeout(() => d.classList.add("dragging"), 0);
    e.dataTransfer.effectAllowed = "move";
  });
  d.addEventListener("dragend", () => {
    d.classList.remove("dragging");
    document.querySelectorAll(".over").forEach(el => el.classList.remove("over"));
  });
  return d;
}

function ov(e, tid) {
  e.preventDefault();
  const el = tid === "pool" ? document.getElementById("pool") : document.getElementById("slot-" + tid);
  if (el) el.classList.add("over");
}
function ol(e) { e.currentTarget.classList.remove("over"); }
function dp(e, tid) {
  e.preventDefault();
  document.querySelectorAll(".over").forEach(el => el.classList.remove("over"));
  if (!drag) return;
  const c = chars.find(x => x.id === drag);
  if (c) c.tier = tid;
  drag = null; render();
}

function setF(type, val, btn) {
  if (type === "role") {
    fRole = val;
    document.querySelectorAll("#role-filters button").forEach(b => b.classList.remove("on"));
  } else {
    fRasa = val;
    document.querySelectorAll("#rasa-filters button").forEach(b => b.classList.remove("on"));
  }
  btn.classList.add("on");
  render();
}

function vis(c) {
  return (fRole === "all" || c.role === fRole) && (fRasa === "all" || c.rasa === fRasa);
}

function render() {
  const cont = document.getElementById("tiers"); cont.innerHTML = "";
  TIERS.forEach(t => {
    const row = document.createElement("div"); row.className = "tier-row";
    const lbl = document.createElement("div"); lbl.className = "tier-lbl";
    lbl.style.background = t.color; lbl.textContent = t.id;
    row.appendChild(lbl);
    const slots = document.createElement("div"); slots.className = "tier-slots"; slots.id = "slot-" + t.id;
    slots.ondragover = e => ov(e, t.id);
    slots.ondrop    = e => dp(e, t.id);
    slots.ondragleave = ol;
    chars.filter(c => c.tier === t.id && vis(c)).forEach(c => slots.appendChild(makeCard(c)));
    row.appendChild(slots); cont.appendChild(row);
  });
  const pool = document.getElementById("pool"); pool.innerHTML = "";
  chars.filter(c => c.tier === "pool" && vis(c)).forEach(c => pool.appendChild(makeCard(c)));
}

function addChar() {
  const name = document.getElementById("iname").value.trim();
  if (!name) { alert("Введите имя персонажа"); return; }
  const role = document.getElementById("irole").value;
  const rasa = document.getElementById("irasa").value;
  chars.push({id:"c"+(++uid), name, role, rasa, img:pendingImg||null, tier:"pool"});
  document.getElementById("iname").value = "";
  document.getElementById("ifile").value = "";
  pendingImg = null; render();
}

function doExport() {
  let out = "Maidens Fantasy Tier List\n";
  TIERS.forEach(t => {
    const ns = chars.filter(c => c.tier === t.id).map(c => c.name + "(" + c.role + "·" + c.rasa + ")");
    if (ns.length) out += "\n[" + t.id + "] " + ns.join(" | ");
  });
  const pool = chars.filter(c => c.tier === "pool").map(c => c.name);
  if (pool.length) out += "\n[Без ранга] " + pool.join(" | ");
  alert(out);
}

buildFilters();
buildLegend();
render();

</script>
</body>
